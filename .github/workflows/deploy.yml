name: Deploy Vite build to Pages

# Step 8 of the Vite migration. The workflow is INERT until the repo's Pages
# source is switched from "Deploy from branch" to "GitHub Actions" (Settings →
# Pages → Build and deployment). Until then, the production site continues to
# ship from the monolith root index.html via dev-server.js auto-deploy commits.
#
# Activation order at cutover (Step 11):
#   1. Merge vite-migration into main
#   2. Repo Settings → Pages → Source: GitHub Actions
#   3. Push or run workflow_dispatch — this workflow builds dist/ and publishes
#
# Triggers:
#   - push to main (production cutover deploys)
#   - push to vite-migration branch (preview deploys per Step 10)
#   - workflow_dispatch (manual)

on:
  push:
    branches:
      - main
      - vite-migration
    # Skip workflow on commits that only touch the monolith / non-Vite assets.
    # dev-server.js auto-deploy commits index.html on every save — those would
    # waste CI minutes building a Vite shell that didn't change. The workflow
    # still re-runs whenever src/ / vite.config.js / package.json / tsconfig.json
    # / the workflow file itself changes.
    paths:
      - 'src/**'
      - 'vite.config.js'
      - 'tsconfig.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Run unit tests
        run: npm test

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run e2e smoke
        run: npm run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Build Vite
        run: npm run build:vite

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
